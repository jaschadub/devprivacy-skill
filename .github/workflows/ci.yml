name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck scripts/*.sh tests/*.sh
      - name: bash syntax
        run: for f in scripts/*.sh tests/*.sh; do bash -n "$f"; done
      - name: catalog sync
        run: tests/sync-catalog.sh
